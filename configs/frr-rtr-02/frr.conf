frr version 9.1
frr defaults traditional
hostname frr-rtr-02
log syslog informational
no ipv6 forwarding
!
interface lo
 ip address 10.0.0.2/32
 ip ospf area 0
!
interface eth1
 description Link to frr-rtr-01 (10.0.12.0/30)
 ip ospf area 0
 ip ospf bfd
 ip ospf network point-to-point
!
interface eth2
 description LAN host-right (192.168.20.0/24)
 ip ospf area 0
 ip ospf passive
!
router ospf
 ospf router-id 10.0.0.2
 passive-interface default
 no passive-interface eth1
 network 10.0.0.2/32 area 0
 network 10.0.0.12/30 area 0
 network 192.168.20.0/24 area 0
!
bfd
 peer 10.0.12.1 interface eth1
  detect-multiplier 3
  receive-interval 300
  transmit-interval 300
 !
!
end
