frr version 9.1
frr defaults traditional
hostname frr-rtr-02
log syslog informational
no ipv6 forwarding
!
! ══════════════════════════════════════════════════════════════════════════════
! FAILURE SCENARIO — OSPF Area Mismatch
! ══════════════════════════════════════════════════════════════════════════════
! Erreur introduite : eth1 est configuré en area 1 au lieu de area 0.
! Conséquence       : rtr-01 (area 0) et rtr-02 (area 1) ne peuvent pas former
!                     d'adjacence OSPF → pas de voisin Full → pipeline CI bloqué.
! Type d'erreur     : area mismatch — fréquent en prod (copier-coller, Jinja2)
! ══════════════════════════════════════════════════════════════════════════════
!
interface lo
 ip address 10.0.0.2/32
!
interface eth1
 description Link to frr-rtr-01 (10.0.12.0/30)
 ip ospf area 1
 ip ospf bfd
 ip ospf network point-to-point
!
interface eth2
 description LAN host-right (192.168.20.0/24)
 ip ospf area 1
 ip ospf passive
!
router ospf
 ospf router-id 10.0.0.2
 passive-interface default
 no passive-interface eth1
 network 10.0.0.2/32 area 1
 network 10.0.0.12/30 area 1
 network 192.168.20.0/24 area 1
!
bfd
 peer 10.0.12.1 interface eth1
  detect-multiplier 3
  receive-interval 300
  transmit-interval 300
 !
!
end
